<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Struktur Keanggotaan - MMS</title>
    
    <link rel="icon" href="images/mms.png" type="image/png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <link rel="stylesheet" href="style.css?v=99">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body> 
    <div class="hero-container" style="align-items: flex-start; padding-top: 160px; padding-bottom: 50px;">
        <div class="hero-overlay"></div>
        
        <div class="content-box" style="max-width: 900px; background: transparent; box-shadow: none;">
            <h2 class="box-title">STRUKTUR PENGURUS INTI</h2>
            <hr class="box-divider" style="margin-bottom: 40px;">

            <div class="swiper mySwiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide">
                        <div class="team-card"><img src="images/ben1.jpg"><h4>Kadarini Setyowati</h4><p>Bendahara I</p><p class="nim-text">NIM: 2026005</p>
                            <div class="team-socials"><a href="#"><i class="fa-brands fa-instagram"></i></a><a href="#"><i class="fa-brands fa-whatsapp"></i></a></div>
                        </div>
                    </div>
                    </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // Inisialisasi Swiper
        var swiper = new Swiper(".mySwiper", {
            slidesPerView: 1, 
            spaceBetween: 20,
            centeredSlides: true,
            loop: true,
            breakpoints: {
                768: { slidesPerView: 3 }
            }
        });

        // Inisialisasi Menu Mobile
        document.getElementById('mobile-menu-btn').addEventListener('click', () => {
            document.querySelector('.main-navbar').classList.toggle('aktif');
        });
    </script>
</body>
</html>
